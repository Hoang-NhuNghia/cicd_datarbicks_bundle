# This is a Databricks asset bundle definition for cicd_template.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: cicd_template
  uuid: e05a0624-f184-49fd-8430-f68dbeefa6ca

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://aucnet-dev.cloud.databricks.com
    variables:
      catalog: hive_metastore
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://aucnet-dev.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/hoangn@ns.aucnet.co.jp to make sure we only have a single copy.
      root_path: /Workspace/Users/hoangn@ns.aucnet.co.jp/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hive_metastore
      schema: prod
    permissions:
      - user_name: hoangn@ns.aucnet.co.jp
        level: CAN_MANAGE
