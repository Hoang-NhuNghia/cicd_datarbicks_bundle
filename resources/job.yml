resources:
  jobs:
    cicd_template_job:
      name: cicd_template_job
      git_source:
        git_url: https://github.com/Hoang-NhuNghia/cicd_datarbicks_bundle
        git_provider: gitHub
        git_branch: ${bundle.git.branch}
      tasks:
        - task_key: init_env_task
          job_cluster_key: job_cluster_main
          spark_python_task:
            python_file: scripts/run_install.py
        - task_key: python_task
          depends_on:
            - task_key: init_env_task
          job_cluster_key: job_cluster_main
          spark_python_task:
            python_file: src/main.py
      job_clusters:
        - job_cluster_key: job_cluster_main
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-scala2.12
            aws_attributes:
              first_on_demand: 1
              zone_id: ap-northeast-1a
              spot_bid_price_percent: 100
            node_type_id: m7gd.2xlarge
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
              SSH_PRIVATE_KEY: "{{secrets/dx_github_deploy_key/deploy_key}}"
            enable_elastic_disk: true
            data_security_mode: DATA_SECURITY_MODE_STANDARD
            runtime_engine: STANDARD
            kind: CLASSIC_PREVIEW
            is_single_node: true
